<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/practica3.css">
</head>
<body>
    <h1>Sistema de Diseño — Componentes UI</h1>
  <p>Demostración de botones y estados interactivos.</p>

  <h2>Botones de acción</h2>
  <button class=" btn_primario" value="guardar cambio">Guardar cambios</button>
  <button class="btn btn-secundario">Cancelar</button>
  <button class="btn btn-exito">✓ Confirmar pedido</button>
  <button class="btn btn-peligro">✕ Eliminar cuenta</button>
  <button class="btn btn-deshabilitado" disabled>No disponible</button>

  <h2>Formulario con estados visuales de validación</h2>
  <div class="formulario-demo">
    <label for="demo-email">Correo electrónico</label>
    <input type="email" id="demo-email" placeholder="tu@correo.com">

    <label for="demo-pass">Contraseña (mín. 8 caracteres)</label>
    <input type="password" id="demo-pass" minlength="8" placeholder="••••••••">

    <button class="btn btn_primario" style="width:100%">Iniciar sesión</button>
  </div>
</body>
</html>

   <h1>Destinos Turísticos del Departamento del Cauca</h1>
    <p>Descubre algunos de los lugares más hermosos del Cauca, Colombia.</p>
    <h2>Popayán - La Ciudad Blanca</h2>
    <figure>
        <img src="imagenes/popayan.jpg" alt="Centro histórico de Popayán" width="400">
        <figcaption>
            Popayán es conocida como la "Ciudad Blanca" por la arquitectura colonial
            de su centro histórico y su gran tradición cultural y religiosa.
        </figcaption>
    </figure>
    <h2>Parque Arqueológico de San Agustín</h2>
    <figure>
        <img src="imagenes/san-agustin.jpg" alt="Estatuas del Parque Arqueológico de San Agustín" width="400">
        <figcaption>
            Este parque arqueológico es Patrimonio de la Humanidad y alberga
            misteriosas esculturas de piedra creadas por antiguas culturas indígenas.
        </figcaption>
    </figure>
    <h2>Parque Nacional Natural Gorgona</h2>
    <figure>
        <img src="imagenes/gorgona.jpg" alt="Isla Gorgona en el Pacífico colombiano" width="400">
        <figcaption>
            La isla Gorgona es un paraíso natural en el océano Pacífico,
            famoso por su biodiversidad, selva tropical y avistamiento de ballenas.
        </figcaption>
    </figure>
    <h2>Silvia y el Pueblo Misak</h2>
    <figure>
        <img src="imagenes/silvia.jpg" alt="Mercado indígena de Silvia" width="400">
        <figcaption>
            Silvia es conocida por su mercado indígena donde el pueblo Misak
            conserva sus tradiciones, vestimenta y cultura ancestral.
        </figcaption>
    </figure>
